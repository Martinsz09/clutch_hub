<!DOCTYPE html>
<html lang="en" 
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security6">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClutchHub | Nexus Gamer</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@800&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <header class="header">
        <a th:href="@{/}" class="logo">
            <i class="ph ph-target"></i> CLUTCH<span>HUB</span>
        </a>

        <div class="search-bar">
            <i class="ph ph-magnifying-glass"></i>
            <input type="text" placeholder="Search for games, bosses or builds...">
        </div>

        <nav class="menu">
            <ul>
                <li><a th:href="@{/}" class="active"><i class="ph ph-house"></i> Home</a></li>
                <li><a th:href="@{/posts/trending}"><i class="ph ph-fire"></i> Trending</a></li>
                
                <div class="nav-auth">
                    <th:block sec:authorize="!isAuthenticated()">
                        <li><a th:href="@{/login}" class="btn-login">Login</a></li>
                        <li><a th:href="@{/register}" class="btn-signup">Sign Up</a></li>
                    </th:block>

                    <th:block sec:authorize="isAuthenticated()">
                        <li><a th:href="@{/post/create}" class="btn-create"><i class="ph ph-plus-circle"></i> Create</a></li>
                        <li>
                            <a th:href="@{/profile}" class="user-profile" style="color: var(--neon); font-weight: 700;">
                                <i class="ph ph-user-circle" style="font-size: 22px;"></i>
                                <span sec:authentication="name">Player</span>
                            </a>
                        </li>
                        <li>
                            <form th:action="@{/logout}" method="post" style="display: inline;">
                                <button type="submit" class="btn-login" style="background:none; border:none; cursor:pointer; font-family: inherit; display: flex; align-items: center;">
                                    <i class="ph ph-sign-out" style="font-size: 20px;"></i>
                                </button>
                            </form>
                        </li>
                    </th:block>
                </div>
            </ul>
        </nav>
    </header>

    <div class="container">
        
        <main class="feed">
            <article class="post-card" th:each="post : ${posts}">
                <div class="vote-sidebar">
                    <i class="ph ph-caret-up"></i>
                    <span th:text="${post.votes != null ? post.votes : 0}">0</span>
                    <i class="ph ph-caret-down"></i>
                </div>

                <div class="post-content">
                    <div class="post-meta">
                        Posted by 
                    <u th:text="${post.author != null ? 'u/' + post.author.username : 'Anonymous'}">u/Author</u> 
    • 
                    <span class="tag" th:text="${post.category}">Category</span>
                </div>

                    <h3 th:text="${post.title}">Post Title</h3>
                    
                    <p th:text="${post.content}">Post content goes here...</p>

                    <div class="post-footer">
                        <button><i class="ph ph-chat-centered-text"></i> <span>0 Comments</span></button>
                        <button><i class="ph ph-share-network"></i> Share</button>
                    </div>
                </div>
            </article>

            <div th:if="${#lists.isEmpty(posts)}" style="text-align: center; padding: 60px; color: var(--text-muted); grid-column: 1 / -1;">
                <i class="ph ph-ghost" style="font-size: 64px; opacity: 0.3;"></i>
                <p style="margin-top: 15px; font-size: 18px;">No transmissions found in this sector.</p>
                <a th:href="@{/post/create}" style="color: var(--neon); text-decoration: none; font-weight: bold;">Broadcast the first one?</a>
            </div>
        </main>

        <aside class="sidebar">
            <div class="sidebar-box community-card">
                <div class="banner"></div>
                <h3>Top Communities</h3>
                
                <div class="game-item">
                    <span>1</span> <p>Resident Evil</p> <button>Join</button>
                </div>
                <div class="game-item">
                    <span>2</span> <p>Elden Ring</p> <button>Join</button>
                </div>
                <div class="game-item">
                    <span>3</span> <p>Dark Souls</p> <button>Join</button>
                </div>
                <div class="game-item">
                    <span>4</span> <p>GTA V</p> <button>Join</button>
                </div>
            </div>
        </aside>

    </div>

</body>
</html>
